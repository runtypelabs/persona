<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/src/demo-shared.css">
  <link rel="icon" href="/favicon.ico" />
  <title>Layout Configuration Demo</title>
  <style>
    body {
      padding: 40px;
    }
    .demo-container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      color: var(--foreground);
      margin-bottom: 12px;
      font-size: 32px;
    }
    .subtitle {
      color: var(--muted);
      margin-bottom: 32px;
      font-size: 18px;
    }
    .layout-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .layout-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-lg);
    }
    .layout-card-header {
      padding: 16px;
      background: var(--accent);
      border-bottom: 1px solid var(--border);
    }
    .layout-card-header h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--foreground);
    }
    .layout-card-header p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }
    .chat-container {
      height: 500px;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <div class="demo-container">
    <h1>Layout Configuration Demo</h1>
    <p class="subtitle">Two preset header layouts plus a custom header rendered with the SDK hook</p>

    <div class="layout-grid">
      <!-- Default Layout -->
      <div class="layout-card">
        <div class="layout-card-header">
          <h3>Default Layout</h3>
          <p>Standard header with icon, title, subtitle</p>
        </div>
        <div class="chat-container" id="chat-default"></div>
      </div>

      <!-- Minimal Layout -->
      <div class="layout-card">
        <div class="layout-card-header">
          <h3>Minimal Layout</h3>
          <p>Simplified header with just title</p>
        </div>
        <div class="chat-container" id="chat-minimal"></div>
      </div>

      <!-- Custom Header -->
      <div class="layout-card">
        <div class="layout-card-header">
          <h3>Custom Header Hook</h3>
          <p>Uses <code>layout.header.render</code> for a fully custom header</p>
        </div>
        <div class="chat-container" id="chat-avatars"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import "@runtypelabs/persona/widget.css";
    import { createAgentExperience } from "@runtypelabs/persona";

    const baseConfig = {
      apiUrl: '/api/chat/dispatch',
      launcher: { enabled: false, fullHeight: true },
      theme: { panelBorderRadius: '0', panelShadow: 'none' },
      statusIndicator: { visible: false },
      voiceRecognition: { enabled: false },
      suggestionChips: [],
      sendButton: {
        useIcon: true,
        iconName: 'send',
        size: '36px',
      },
      // Disable persistence so we use fresh initialMessages each time
      storageAdapter: {
        load: () => null,
        save: () => {},
        clear: () => {}
      },
      initialMessages: [
        {
          id: '1',
          role: 'assistant',
          content: 'Hello! How can I help you today?',
          createdAt: new Date(Date.now() - 120000).toISOString()
        },
        {
          id: '2',
          role: 'user',
          content: 'I have a question about layouts',
          createdAt: new Date(Date.now() - 60000).toISOString()
        },
        {
          id: '3',
          role: 'assistant',
          content: 'Of course! I\'d be happy to help explain the different layout options available.',
          createdAt: new Date().toISOString()
        }
      ]
    };

    // 1. Default Layout
    createAgentExperience(
      document.getElementById('chat-default'),
      {
        ...baseConfig,
        launcher: {
          ...baseConfig.launcher,
          title: 'Support Agent',
          subtitle: 'Here to help',
          headerIconName: 'message-circle',
        },
        layout: {
          header: {
            layout: 'default',
            showIcon: true,
            showTitle: true,
            showSubtitle: true,
            showCloseButton: false,
            showClearChat: false
          },
          messages: {
            layout: 'bubble'
          }
        }
      }
    );

    // 2. Minimal Layout
    createAgentExperience(
      document.getElementById('chat-minimal'),
      {
        ...baseConfig,
        launcher: {
          ...baseConfig.launcher,
          title: 'Quick Chat',
          subtitle: 'Here to help you get answers fast',
        },
        layout: {
          header: {
            layout: 'minimal',
            showCloseButton: false
          },
          messages: {
            layout: 'minimal'
          }
        }
      }
    );

    // 3. Custom header via layout.header.render
    createAgentExperience(
      document.getElementById('chat-avatars'),
      {
        ...baseConfig,
        launcher: {
          ...baseConfig.launcher,
          title: 'AI Assistant',
          subtitle: 'Always online',
          headerIconName: 'bot',
        },
        layout: {
          header: {
            render: ({ onClose }) => {
              const header = document.createElement('div');
              header.style.display = 'flex';
              header.style.flexDirection = 'column';
              header.style.gap = '12px';
              header.style.padding = '20px 24px';
              header.style.background = 'linear-gradient(135deg, #111827 0%, #1f2937 100%)';
              header.style.color = '#ffffff';
              header.style.borderBottom = '1px solid rgba(255, 255, 255, 0.08)';

              const topRow = document.createElement('div');
              topRow.style.display = 'flex';
              topRow.style.alignItems = 'center';
              topRow.style.justifyContent = 'space-between';
              topRow.style.gap = '12px';

              const titleWrap = document.createElement('div');

              const badge = document.createElement('div');
              badge.textContent = 'CUSTOM HEADER';
              badge.style.fontSize = '10px';
              badge.style.fontWeight = '700';
              badge.style.letterSpacing = '0.12em';
              badge.style.opacity = '0.7';
              badge.style.marginBottom = '6px';

              const title = document.createElement('div');
              title.textContent = 'Concierge Support';
              title.style.fontSize = '18px';
              title.style.fontWeight = '700';

              const subtitle = document.createElement('div');
              subtitle.textContent = 'Priority routing with a custom action row';
              subtitle.style.fontSize = '13px';
              subtitle.style.opacity = '0.8';
              subtitle.style.marginTop = '2px';

              titleWrap.append(badge, title, subtitle);

              const closeButton = document.createElement('button');
              closeButton.type = 'button';
              closeButton.textContent = '×';
              closeButton.setAttribute('aria-label', 'Close chat');
              closeButton.style.width = '32px';
              closeButton.style.height = '32px';
              closeButton.style.border = 'none';
              closeButton.style.borderRadius = '999px';
              closeButton.style.background = 'rgba(255, 255, 255, 0.12)';
              closeButton.style.color = '#ffffff';
              closeButton.style.cursor = 'pointer';
              closeButton.style.fontSize = '20px';
              closeButton.style.lineHeight = '1';
              if (onClose) closeButton.addEventListener('click', onClose);

              topRow.append(titleWrap, closeButton);

              const actionsRow = document.createElement('div');
              actionsRow.style.display = 'flex';
              actionsRow.style.gap = '8px';
              actionsRow.style.flexWrap = 'wrap';

              ['Talk to sales', 'View docs', 'Check status'].forEach((label) => {
                const chip = document.createElement('button');
                chip.type = 'button';
                chip.textContent = label;
                chip.style.padding = '6px 10px';
                chip.style.borderRadius = '999px';
                chip.style.border = '1px solid rgba(255, 255, 255, 0.16)';
                chip.style.background = 'rgba(255, 255, 255, 0.08)';
                chip.style.color = '#ffffff';
                chip.style.fontSize = '12px';
                chip.style.cursor = 'pointer';
                actionsRow.appendChild(chip);
              });

              header.append(topRow, actionsRow);
              return header;
            }
          },
          messages: {
            layout: 'bubble'
          }
        }
      }
    );

    console.log('All layout demos initialized');
  </script>
</body>
</html>
