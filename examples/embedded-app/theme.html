<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Persona Theme Editor</title>
  </head>
  <body>
    <main class="configurator-layout">
      <!-- Left Panel: Configuration Controls -->
      <aside class="config-panel">
        <div class="config-header">
          <h1>Theme Editor</h1>
          <p class="subtitle">Customize your Persona widget with the v2 semantic token system.</p>
        </div>

        <!-- Search -->
        <div class="search-section">
          <div class="search-input-wrapper">
            <input
              type="text"
              id="field-search"
              class="search-input"
              placeholder="Search fields… (⌘K)"
              autocomplete="off"
            />
            <button type="button" id="clear-search" class="clear-search-btn" style="display: none;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
          <div id="search-results" class="search-results hidden"></div>
        </div>

        <!-- Tab Navigation -->
        <nav id="tab-nav" class="tab-nav"></nav>

        <!-- Tab Content (sections rendered dynamically) -->
        <div id="tab-content" class="tab-content"></div>
      </aside>

      <!-- Right Panel: Live Preview -->
      <section class="preview-panel">
        <div class="preview-header">
          <h2>Preview</h2>
        </div>
        <div id="widget-preview" class="widget-preview-container"></div>
      </section>
    </main>

    <script type="module" src="/src/theme-configurator/index.ts"></script>
  </body>
</html>
