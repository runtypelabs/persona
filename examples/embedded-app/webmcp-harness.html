<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebMCP Browser Harness</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }
    .layout {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem;
      display: grid;
      gap: 1rem;
      grid-template-columns: 1fr 420px;
    }
    @media (max-width: 960px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
    .panel {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 1rem;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 0.5rem 0 1rem;
    }
    button {
      border: 1px solid #d1d5db;
      background: #111827;
      color: #ffffff;
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      font-size: 0.9rem;
      cursor: pointer;
    }
    button.secondary {
      background: #ffffff;
      color: #111827;
    }
    .result-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 0.4rem;
    }
    .result-item {
      font-family: ui-monospace, Menlo, Monaco, "Cascadia Mono", Consolas, monospace;
      font-size: 0.82rem;
      padding: 0.5rem 0.6rem;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .pass { border-color: #86efac; background: #f0fdf4; color: #166534; }
    .fail { border-color: #fca5a5; background: #fef2f2; color: #991b1b; }
    .log {
      margin-top: 0.75rem;
      max-height: 260px;
      overflow: auto;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 10px;
      padding: 0.75rem;
      font-family: ui-monospace, Menlo, Monaco, Consolas, monospace;
      font-size: 0.78rem;
      line-height: 1.4;
      white-space: pre-wrap;
    }
    #webmcp-widget {
      min-height: 620px;
      height: 70vh;
    }
    .small {
      font-size: 0.84rem;
      color: #4b5563;
    }
    .back-link {
      display: inline-block;
      margin: 1rem;
      color: #1d4ed8;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <a href="/" class="back-link">&larr; Back to examples</a>
  <main class="layout">
    <section class="panel">
      <h1>WebMCP Browser Harness</h1>
      <p class="small">
        Verifies unsupported fallback, mock WebMCP ready path, error fallback, and cleanup behavior in-browser.
        <br>
        <span id="browser-status" style="font-weight: 600; color: #dc2626;">WebMCP not detected in this browser</span>
      </p>
      <div class="controls">
        <button id="run-real" disabled style="opacity: 0.5; cursor: not-allowed;">Run Real (Browser)</button>
        <button id="run-unsupported">Run Unsupported</button>
        <button id="run-ready">Run Mock Ready</button>
        <button id="run-error">Run Mock Error</button>
        <button id="run-cleanup">Run Cleanup</button>
        <button id="run-all">Run All</button>
        <button class="secondary" id="clear-results">Clear Results</button>
      </div>
      <ul id="results" class="result-list"></ul>
      <div id="event-log" class="log"></div>
    </section>
    <section class="panel">
      <h2>Harness Widget</h2>
      <div id="webmcp-widget"></div>
    </section>
  </main>
  <script type="module" src="/src/webmcp-harness.ts"></script>
</body>
</html>
