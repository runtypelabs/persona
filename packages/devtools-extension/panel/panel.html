<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <!-- Top bar: instance selector + connection status -->
  <header id="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">P</span>
      <span class="topbar-title">Persona DevTools</span>
    </div>
    <div class="topbar-right">
      <select id="instance-select" title="Select widget instance">
        <option value="">No widget detected</option>
      </select>
      <span id="connection-badge" class="badge badge-gray">Searching...</span>
    </div>
  </header>

  <!-- Tab bar -->
  <nav id="tab-bar">
    <button class="tab-btn active" data-tab="theme" title="Theme Inspector">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a7 7 0 0 0 0 14h.5"/><circle cx="8" cy="9" r="1.5" fill="currentColor"/><circle cx="12" cy="7" r="1.5" fill="currentColor"/><circle cx="16" cy="9" r="1.5" fill="currentColor"/></svg>
      Theme
    </button>
    <button class="tab-btn" data-tab="state" title="State Inspector">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      State
    </button>
    <button class="tab-btn" data-tab="events" title="Event Stream">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 0 1 0 8.49"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
      Events
    </button>
    <button class="tab-btn" data-tab="config" title="Configuration">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Config
    </button>
    <button class="tab-btn" data-tab="elements" title="Elements Explorer">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Elements
    </button>
  </nav>

  <!-- Tab content panels -->
  <main id="tab-content">
    <div id="tab-theme" class="tab-panel active"></div>
    <div id="tab-state" class="tab-panel"></div>
    <div id="tab-events" class="tab-panel"></div>
    <div id="tab-config" class="tab-panel"></div>
    <div id="tab-elements" class="tab-panel"></div>
  </main>

  <!-- Placeholder shown when no widget is detected -->
  <div id="no-widget-overlay" class="overlay">
    <div class="overlay-content">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <h2>No Persona Widget Detected</h2>
      <p>Navigate to a page that contains a Persona chat widget.<br>
      The extension will connect automatically.</p>
      <button id="retry-detect" class="btn">Retry Detection</button>
    </div>
  </div>

  <script src="panel.js" type="module"></script>
</body>
</html>
